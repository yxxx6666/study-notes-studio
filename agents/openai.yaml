interface:
  display_name: "Study Notes Studio 学霸学习笔记"
  short_description: "把学习内容整理成严格 3:4、有重点、能复习的视觉学习笔记，支持完整覆盖审计"
  default_prompt: "Use $study-notes-studio 帮我把这段内容整理成严格 3:4 的学习笔记图。出图默认且强制使用图片生成模型，不得擅自切到程序绘制或 HTML。先做内容前置理解：识别类型、抽取条目并计数、决定呈现结构。默认先判断模式：完整笔记 > 长文配图 > 总览笔记；如果用户要求完整、不遗漏、覆盖全文或全部步骤，必须进入完整笔记模式并执行覆盖矩阵审计。标题数字必须和画面项数一致；页码与内部约束不得画进图片。每页使用原创学习锚点图案增强记忆；8 个以上编号项默认拆页。"
triggers:
  complete_notes:
    priority: 100
    match:
      - "完整整理"
      - "不遗漏"
      - "覆盖全文"
      - "全部步骤"
      - "全文学习笔记"
      - "详细学习笔记"
      - "考试复习笔记"
    behavior: "进入完整笔记模式；知识点编号；页码—知识点覆盖矩阵；最终覆盖审计。"
  long_article_illustration:
    priority: 60
    match:
      - "长文配图"
      - "章节配图"
      - "给文章配图"
      - "公众号插图"
      - "每个章节一张图"
    behavior: "进入长文配图模式；只覆盖章节主旨；不得承诺完整。"
  overview_notes:
    priority: 20
    match:
      - "整理成学习笔记"
      - "做一张学习笔记图"
      - "生成学习笔记"
    behavior: "默认生成 1 张总览学习笔记图；不承诺完整覆盖。"
priority_rule: "完整笔记 > 长文配图 > 总览笔记。若同时出现完整/不遗漏/覆盖全文与长文配图，完整笔记优先。"
visual_rule: "每页加入一个原创、轻量、内容相关的学习锚点图案；仅使用普通学习物件、路径符号、记忆符号或抽象结构符号，不使用角色 IP、拟人怪物或固定吉祥物。"
policy:
  allow_implicit_invocation: true

execution_rule: "生成后检查实际 3:4 比例；比例失败先用同一出图引擎做比例专用重试。"

style_rule: "默认像手写学生复习笔记，不像信息图、海报、PPT 或 UI 卡片网格；每页只保留一个核心图解和一个学习锚点。"

color_style_rule: "默认清爽彩色手写学习笔记：黑笔骨架 + 荧光黄关键词 + 浅蓝分区 + 浅绿结论 + 浅粉/红色提醒 + 淡橙路径；不要纯黑白，也不要商业信息图配色。"

engine_rule: "出图默认且强制使用图片生成模型（image_gen / AI 生图）；只有用户明确要求确定性 PNG / 固定像素 / 程序绘制时才允许 Pillow；禁止以中文可读或严格比例为由擅自切换引擎。"

content_rule: "出图前所有模式都必须先做内容前置理解：识别内容类型、抽取条目并计数、决定逐项列全还是合并大类、去重补缺正规化，再进入版面。"

title_count_rule: "标题中出现的数量必须等于画面实际呈现的项数；若合并为大类，标题或框架必须诚实标注映射（如 12 个习惯→4 大类），禁止标题写 N 个而画面只画 M 个却不解释。"

image_text_rule: "页码、事实边界、生成提醒、禁止写法、prompt 约束、模式名等内部信息不得画进图片，只能用于文件名、交付说明或对话；'不要写成……'类元话语不入图。"
